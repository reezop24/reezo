<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Owner Builder</title>
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="bg.mp4" type="video/mp4" />
  </video>
  <div class="bg-fx"></div>
  <main class="container">
    <header class="hero">
      <div class="logo-wrap"><img src="logo.png" alt="Reezo Logo" class="site-logo" /></div>
      <h1>Owner Builder</h1>
      <p>Update sekali, user guna link yang sama: <code>/</code>.</p>
    </header>

    <section class="card">
      <h2 class="section-title">Main Setup</h2>
      <div class="grid">
        <div><label>Title</label><input id="titleInput" /></div>
        <div><label>Subtitle</label><textarea id="subtitleInput"></textarea></div>
        <div><label>Primary Label</label><input id="primaryLabelInput" /></div>
        <div><label>Primary URL</label><input id="primaryUrlInput" placeholder="https://..." /></div>
        <div><label>Primary Icon URL (optional)</label><input id="primaryIconInput" placeholder="telegram.png atau https://..." /></div>
        <div>
          <label>Primary Effect</label>
          <select id="primaryEffectInput">
            <option value="">None</option>
            <option value="fire">Api Glow</option>
          </select>
        </div>
        <div><label>Secondary Label</label><input id="secondaryLabelInput" /></div>
        <div><label>Secondary URL</label><input id="secondaryUrlInput" placeholder="https://..." /></div>
        <div><label>Secondary Icon URL (optional)</label><input id="secondaryIconInput" placeholder="whatsapp.png atau https://..." /></div>
        <div>
          <label>Secondary Effect</label>
          <select id="secondaryEffectInput">
            <option value="">None</option>
            <option value="fire">Api Glow</option>
          </select>
        </div>
        <div><label>Owner PIN (required)</label><input id="ownerPinInput" placeholder="Default: 778899 (atau ikut env LANDING_OWNER_PIN)" /></div>
      </div>

      <div class="card" style="margin-top:12px;">
        <h3 class="section-title" style="font-size:16px;">Extra Buttons</h3>
        <div id="extraList" class="grid"></div>
        <div class="actions"><button id="addExtra" class="btn btn-secondary" type="button">+ Add Button</button></div>
      </div>

      <div class="actions">
        <button id="submitConfig" class="btn btn-primary" type="button">Submit (Update Live)</button>
        <button id="openUser" class="btn btn-secondary" type="button">Open User Page</button>
        <button id="copyUser" class="btn btn-secondary" type="button">Copy User Link</button>
      </div>
      <div id="error" class="error"></div>
      <div id="success" class="success"></div>
    </section>

    <section class="card">
      <h2 class="section-title">Live Preview</h2>
      <div class="actions">
        <a id="pv1" class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">Primary</a>
        <a id="pv2" class="btn btn-secondary" href="#" target="_blank" rel="noopener noreferrer">Secondary</a>
        <div id="pvExtra" class="actions" style="margin-top:0"></div>
      </div>
    </section>
  </main>

  <script>
    (function () {
      var defaults = Object.assign({
        title: "Reezo Official Links",
        subtitle: "Pilih mana-mana link rasmi di bawah.",
        primaryLabel: "Open Bot",
        primaryUrl: "https://t.me/MMHREEZO_BOT",
        primaryIcon: "telegram.png",
        primaryEffect: "",
        secondaryLabel: "Open WhatsApp Channel",
        secondaryUrl: "https://whatsapp.com/channel/YOUR_CHANNEL_ID",
        secondaryIcon: "whatsapp.png",
        secondaryEffect: "",
        extraButtons: []
      }, window.LANDING_DEFAULTS || {});

      var el = {
        title: document.getElementById("titleInput"),
        subtitle: document.getElementById("subtitleInput"),
        pLabel: document.getElementById("primaryLabelInput"),
        pUrl: document.getElementById("primaryUrlInput"),
        pIcon: document.getElementById("primaryIconInput"),
        pEffect: document.getElementById("primaryEffectInput"),
        sLabel: document.getElementById("secondaryLabelInput"),
        sUrl: document.getElementById("secondaryUrlInput"),
        sIcon: document.getElementById("secondaryIconInput"),
        sEffect: document.getElementById("secondaryEffectInput"),
        pin: document.getElementById("ownerPinInput"),
        extraList: document.getElementById("extraList"),
        addExtra: document.getElementById("addExtra"),
        submit: document.getElementById("submitConfig"),
        openUser: document.getElementById("openUser"),
        copyUser: document.getElementById("copyUser"),
        err: document.getElementById("error"),
        ok: document.getElementById("success"),
        pv1: document.getElementById("pv1"),
        pv2: document.getElementById("pv2"),
        pvExtra: document.getElementById("pvExtra")
      };

      function val(x) { return String((x && x.value) || "").trim(); }
      function validUrl(u) { return /^https?:\/\//i.test(u); }
      function validIcon(u) {
        if (!u) return true;
        return /^https?:\/\//i.test(u) || /^(?:\.\/|\/)?[A-Za-z0-9_.\-\/]+\.(png|jpg|jpeg|webp|svg|gif)$/i.test(u);
      }

      function setButtonContent(buttonEl, label, iconUrl, effect) {
        buttonEl.classList.remove("btn-fire");
        if (effect === "fire") buttonEl.classList.add("btn-fire");
        buttonEl.textContent = "";
        var wrap = document.createElement("span");
        wrap.className = "btn-content";
        if (iconUrl && validIcon(iconUrl)) {
          var img = document.createElement("img");
          img.className = "btn-icon";
          img.src = iconUrl;
          img.alt = "";
          wrap.appendChild(img);
        }
        var txt = document.createElement("span");
        txt.textContent = label;
        wrap.appendChild(txt);
        buttonEl.appendChild(wrap);
      }

      function collectExtras() {
        return Array.from(el.extraList.querySelectorAll(".x-row")).map(function (row) {
          return {
            label: val(row.querySelector(".x-label")),
            url: val(row.querySelector(".x-url")),
            icon: val(row.querySelector(".x-icon")),
            effect: val(row.querySelector(".x-effect"))
          };
        }).filter(function (x) { return x.label || x.url || x.icon; });
      }

      function renderExtras(list) {
        el.extraList.innerHTML = "";
        list.forEach(function (item, i) {
          var row = document.createElement("div");
          row.className = "x-row row-box";
          row.innerHTML =
            '<div class="grid">' +
              '<div><label>Label #' + (i + 1) + '</label><input class="x-label" value="' + (item.label || "").replace(/"/g, "&quot;") + '" /></div>' +
              '<div><label>URL #' + (i + 1) + '</label><input class="x-url" value="' + (item.url || "").replace(/"/g, "&quot;") + '" placeholder="https://..." /></div>' +
              '<div><label>Icon #' + (i + 1) + ' (optional)</label><input class="x-icon" value="' + (item.icon || "").replace(/"/g, "&quot;") + '" placeholder="icon.png atau https://..." /></div>' +
              '<div><label>Effect #' + (i + 1) + '</label><select class="x-effect"><option value="">None</option><option value="fire"' + ((item.effect || "") === "fire" ? " selected" : "") + '>Api Glow</option></select></div>' +
              '<button type="button" class="btn btn-secondary x-remove">Remove</button>' +
            '</div>';
          el.extraList.appendChild(row);
        });

        Array.from(el.extraList.querySelectorAll(".x-remove")).forEach(function (b) {
          b.addEventListener("click", function () { b.closest(".x-row").remove(); onChange(); });
        });
        Array.from(el.extraList.querySelectorAll(".x-label,.x-url,.x-icon,.x-effect")).forEach(function (n) {
          n.addEventListener("input", onChange);
          n.addEventListener("change", onChange);
        });
      }

      function payload() {
        return {
          title: val(el.title),
          subtitle: val(el.subtitle),
          primaryLabel: val(el.pLabel),
          primaryUrl: val(el.pUrl),
          primaryIcon: val(el.pIcon),
          primaryEffect: val(el.pEffect),
          secondaryLabel: val(el.sLabel),
          secondaryUrl: val(el.sUrl),
          secondaryIcon: val(el.sIcon),
          secondaryEffect: val(el.sEffect),
          extraButtons: collectExtras()
        };
      }

      function validate() {
        el.err.textContent = "";
        el.ok.textContent = "";
        var p = payload();
        if (!validUrl(p.primaryUrl)) { el.err.textContent = "Primary URL kena https://"; return false; }
        if (!validUrl(p.secondaryUrl)) { el.err.textContent = "Secondary URL kena https://"; return false; }
        if (!validIcon(p.primaryIcon)) { el.err.textContent = "Primary icon tak valid"; return false; }
        if (!validIcon(p.secondaryIcon)) { el.err.textContent = "Secondary icon tak valid"; return false; }
        for (var i = 0; i < p.extraButtons.length; i += 1) {
          var x = p.extraButtons[i];
          if (!x.label || !x.url) { el.err.textContent = "Extra #" + (i + 1) + " perlukan label + URL"; return false; }
          if (!validUrl(x.url)) { el.err.textContent = "Extra URL #" + (i + 1) + " kena https://"; return false; }
          if (!validIcon(x.icon)) { el.err.textContent = "Extra icon #" + (i + 1) + " tak valid"; return false; }
        }
        return true;
      }

      function preview() {
        setButtonContent(el.pv1, val(el.pLabel) || "Primary", val(el.pIcon), val(el.pEffect));
        el.pv1.href = validUrl(val(el.pUrl)) ? val(el.pUrl) : "#";
        setButtonContent(el.pv2, val(el.sLabel) || "Secondary", val(el.sIcon), val(el.sEffect));
        el.pv2.href = validUrl(val(el.sUrl)) ? val(el.sUrl) : "#";
        el.pvExtra.innerHTML = "";
        collectExtras().forEach(function (x) {
          if (!x.label) return;
          var a = document.createElement("a");
          a.className = "btn btn-secondary";
          setButtonContent(a, x.label, x.icon || "", x.effect || "");
          a.href = validUrl(x.url) ? x.url : "#";
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          el.pvExtra.appendChild(a);
        });
      }

      function saveDraft() {
        localStorage.setItem("reezoLandingDraft", JSON.stringify({ pin: val(el.pin), data: payload() }));
      }

      function loadDraft() {
        try {
          var d = JSON.parse(localStorage.getItem("reezoLandingDraft") || "{}");
          if (d.pin) el.pin.value = d.pin;
          if (!d.data) return;
          var p = d.data;
          if (p.title) el.title.value = p.title;
          if (p.subtitle) el.subtitle.value = p.subtitle;
          if (p.primaryLabel) el.pLabel.value = p.primaryLabel;
          if (p.primaryUrl) el.pUrl.value = p.primaryUrl;
          if (p.primaryIcon) el.pIcon.value = p.primaryIcon;
          if (p.primaryEffect) el.pEffect.value = p.primaryEffect;
          if (p.secondaryLabel) el.sLabel.value = p.secondaryLabel;
          if (p.secondaryUrl) el.sUrl.value = p.secondaryUrl;
          if (p.secondaryIcon) el.sIcon.value = p.secondaryIcon;
          if (p.secondaryEffect) el.sEffect.value = p.secondaryEffect;
          if (Array.isArray(p.extraButtons)) renderExtras(p.extraButtons);
        } catch (_) {}
      }

      async function loadRemote() {
        try {
          var resp = await fetch("/api/config", { cache: "no-store" });
          if (!resp.ok) return;
          var out = await resp.json();
          if (!out || !out.data) return;
          var p = out.data;
          if (p.title) el.title.value = p.title;
          if (p.subtitle) el.subtitle.value = p.subtitle;
          if (p.primaryLabel) el.pLabel.value = p.primaryLabel;
          if (p.primaryUrl) el.pUrl.value = p.primaryUrl;
          if (typeof p.primaryIcon === "string") el.pIcon.value = p.primaryIcon;
          if (typeof p.primaryEffect === "string") el.pEffect.value = p.primaryEffect;
          if (p.secondaryLabel) el.sLabel.value = p.secondaryLabel;
          if (p.secondaryUrl) el.sUrl.value = p.secondaryUrl;
          if (typeof p.secondaryIcon === "string") el.sIcon.value = p.secondaryIcon;
          if (typeof p.secondaryEffect === "string") el.sEffect.value = p.secondaryEffect;
          renderExtras(Array.isArray(p.extraButtons) ? p.extraButtons : []);
        } catch (_) {
          // no-op
        }
      }

      async function submitRemote() {
        if (!validate()) return;
        try {
          var p = payload();
          var resp = await fetch("/api/config", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify(Object.assign({}, p, { pin: val(el.pin) }))
          });
          var out = await resp.json();
          if (!resp.ok || !out.ok) {
            el.err.textContent = out && out.error ? ("Submit gagal: " + out.error) : "Submit gagal";
            return;
          }
          if (out.savedKv) {
            el.ok.textContent = "Live config updated (permanent: KV). User link kekal sama.";
          } else {
            el.ok.textContent = "Live config updated sementara (memory). Set KV env untuk permanent.";
          }
          saveDraft();
        } catch (_) {
          el.err.textContent = "Submit gagal (network/API).";
        }
      }

      function onChange() { preview(); saveDraft(); }

      el.title.value = defaults.title;
      el.subtitle.value = defaults.subtitle;
      el.pLabel.value = defaults.primaryLabel;
      el.pUrl.value = defaults.primaryUrl;
      el.pIcon.value = defaults.primaryIcon || "";
      el.pEffect.value = defaults.primaryEffect || "";
      el.sLabel.value = defaults.secondaryLabel;
      el.sUrl.value = defaults.secondaryUrl;
      el.sIcon.value = defaults.secondaryIcon || "";
      el.sEffect.value = defaults.secondaryEffect || "";
      renderExtras(Array.isArray(defaults.extraButtons) ? defaults.extraButtons : []);

      loadDraft();
      loadRemote().then(preview);
      preview();

      [el.title, el.subtitle, el.pLabel, el.pUrl, el.pIcon, el.pEffect, el.sLabel, el.sUrl, el.sIcon, el.sEffect, el.pin].forEach(function (n) {
        n.addEventListener("input", onChange);
        n.addEventListener("change", onChange);
      });

      el.addExtra.addEventListener("click", function () {
        var x = collectExtras();
        x.push({ label: "", url: "", icon: "", effect: "" });
        renderExtras(x);
        onChange();
      });

      el.submit.addEventListener("click", submitRemote);
      el.openUser.addEventListener("click", function () { window.open("/", "_blank", "noopener"); });
      el.copyUser.addEventListener("click", async function () {
        var link = new URL("/", window.location.href).toString();
        try {
          await navigator.clipboard.writeText(link);
          el.ok.textContent = "User link copied.";
        } catch (_) {
          el.ok.textContent = "Copy manual: " + link;
        }
      });
    })();
  </script>
</body>
</html>
