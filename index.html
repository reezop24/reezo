<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reezo Links</title>
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>
  <video class="bg-video" autoplay muted loop playsinline preload="auto">
    <source src="bg.mp4" type="video/mp4" />
  </video>
  <div class="bg-fx"></div>
  <main class="container">
    <header class="hero">
      <div class="logo-wrap"><img src="logo.png" alt="Reezo Logo" class="site-logo" /></div>
      <h1 id="title">Reezo Official Links</h1>
      <p id="subtitle">Pilih mana-mana link rasmi di bawah.</p>
    </header>

    <section id="quickCard" class="card is-loading">
      <img src="nextexc.gif" alt="NEXT Exclusive" class="promo-image" />
      <h2 class="section-title">Quick Access</h2>
      <div id="mainActions" class="actions">
        <a id="primaryBtn" class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">Open Bot</a>
        <a id="secondaryBtn" class="btn btn-secondary" href="#" target="_blank" rel="noopener noreferrer">Open WhatsApp Channel</a>
        <div id="extraBtns" class="actions" style="margin-top:0"></div>
      </div>
      <div id="loadingText" class="loading-text">Loading latest links...</div>
    </section>
  </main>

  <script>
    (function () {
      var fallback = {
        title: "Reezo Official Links",
        subtitle: "Pilih mana-mana link rasmi di bawah.",
        primaryLabel: "Open Bot",
        primaryUrl: "https://t.me/MMHREEZO_BOT",
        primaryIcon: "telegram.png",
        primaryEffect: "",
        primaryColor: "",
        secondaryLabel: "Open WhatsApp Channel",
        secondaryUrl: "https://whatsapp.com/channel/YOUR_CHANNEL_ID",
        secondaryIcon: "whatsapp.png",
        secondaryEffect: "",
        secondaryColor: "",
        extraButtons: []
      };
      var defaults = Object.assign({}, fallback, window.LANDING_DEFAULTS || {});

      function validUrl(u) { return /^https?:\/\//i.test(u); }
      function validIcon(u) {
        if (!u) return true;
        return /^https?:\/\//i.test(u) || /^(?:\.\/|\/)?[A-Za-z0-9_.\-\/]+\.(png|jpg|jpeg|webp|svg|gif)$/i.test(u);
      }
      function validHexColor(v) {
        return /^#(?:[0-9a-fA-F]{6}|[0-9a-fA-F]{3})$/.test(String(v || "").trim());
      }
      function normalizeHex(v) {
        var s = String(v || "").trim();
        if (!validHexColor(s)) return "";
        if (s.length === 4) {
          return "#" + s[1] + s[1] + s[2] + s[2] + s[3] + s[3];
        }
        return s;
      }
      function textColorFor(bgHex) {
        var hex = normalizeHex(bgHex).slice(1);
        if (hex.length !== 6) return "";
        var r = parseInt(hex.slice(0, 2), 16);
        var g = parseInt(hex.slice(2, 4), 16);
        var b = parseInt(hex.slice(4, 6), 16);
        var yiq = (r * 299 + g * 587 + b * 114) / 1000;
        return yiq >= 160 ? "#1b1020" : "#fff7ff";
      }
      function applyButtonColor(buttonEl, colorHex) {
        buttonEl.style.background = "";
        buttonEl.style.borderColor = "";
        buttonEl.style.color = "";
        var hex = normalizeHex(colorHex);
        if (!hex) return;
        buttonEl.style.background = hex;
        buttonEl.style.borderColor = hex;
        buttonEl.style.color = textColorFor(hex);
      }

      function setButtonContent(buttonEl, label, iconUrl, effect, color) {
        buttonEl.classList.remove("btn-fire");
        if (effect === "fire") buttonEl.classList.add("btn-fire");
        applyButtonColor(buttonEl, color);
        buttonEl.textContent = "";
        var wrap = document.createElement("span");
        wrap.className = "btn-content";
        if (iconUrl && validIcon(iconUrl)) {
          var img = document.createElement("img");
          img.className = "btn-icon";
          img.src = iconUrl;
          img.alt = "";
          wrap.appendChild(img);
        }
        var txt = document.createElement("span");
        txt.textContent = label;
        wrap.appendChild(txt);
        buttonEl.appendChild(wrap);
      }

      function sanitizeConfig(cfg) {
        var c = Object.assign({}, defaults, cfg || {});
        c.extraButtons = Array.isArray(c.extraButtons) ? c.extraButtons : [];
        return c;
      }

      function render(cfg) {
        var c = sanitizeConfig(cfg);
        document.getElementById("title").textContent = c.title || defaults.title;
        document.getElementById("subtitle").textContent = c.subtitle || defaults.subtitle;

        var pBtn = document.getElementById("primaryBtn");
        var sBtn = document.getElementById("secondaryBtn");
        setButtonContent(pBtn, c.primaryLabel || defaults.primaryLabel, c.primaryIcon || "", c.primaryEffect || "", c.primaryColor || "");
        pBtn.href = validUrl(c.primaryUrl) ? c.primaryUrl : "#";
        setButtonContent(sBtn, c.secondaryLabel || defaults.secondaryLabel, c.secondaryIcon || "", c.secondaryEffect || "", c.secondaryColor || "");
        sBtn.href = validUrl(c.secondaryUrl) ? c.secondaryUrl : "#";

        var extra = document.getElementById("extraBtns");
        extra.innerHTML = "";
        c.extraButtons.forEach(function (item) {
          var label = String((item && item.label) || "").trim();
          var url = String((item && item.url) || "").trim();
          var icon = String((item && item.icon) || "").trim();
          if (!label || !validUrl(url)) return;
          var a = document.createElement("a");
          a.className = "btn btn-secondary";
          setButtonContent(
            a,
            label,
            icon,
            String((item && item.effect) || "").trim(),
            String((item && item.color) || "").trim()
          );
          a.href = url;
          a.target = "_blank";
          a.rel = "noopener noreferrer";
          extra.appendChild(a);
        });

        try {
          localStorage.setItem("reezoLiveConfigCache", JSON.stringify(c));
        } catch (_) {}

        var card = document.getElementById("quickCard");
        var loadingText = document.getElementById("loadingText");
        if (card) card.classList.remove("is-loading");
        if (loadingText) loadingText.style.display = "none";
      }

      async function loadRemote() {
        var cached = null;
        try {
          cached = JSON.parse(localStorage.getItem("reezoLiveConfigCache") || "null");
        } catch (_) {}

        try {
          var resp = await fetch("/api/config", { cache: "no-store" });
          if (!resp.ok) {
            render(cached || defaults);
            return;
          }
          var out = await resp.json();
          render(out && out.data ? out.data : (cached || defaults));
        } catch (_) {
          render(cached || defaults);
        }
      }

      loadRemote();
    })();
  </script>
</body>
</html>
