<body>

    </header>

      <h2 class="section-title">Quick Access</h2>

        <a id="secondaryBtn" class="btn btn-secondary" href="#" target="_blank" rel="noopener noreferrer">Open WhatsApp Channel</a>

  <script>
    (function () {
      var fallback = {
        title: "Reezo Official Links",
        subtitle: "Pilih mana-mana link rasmi di bawah.",
        primaryLabel: "Open Bot",
        primaryUrl: "https://t.me/MMHREEZO_BOT",
        secondaryLabel: "Open WhatsApp Channel",
        secondaryUrl: "https://whatsapp.com/channel/YOUR_CHANNEL_ID",
        extraButtons: []
      };
      var defaults = Object.assign({}, fallback, window.LANDING_DEFAULTS || {});

      function q(name) {
        try {
          return new URLSearchParams(window.location.search).get(name) || "";
        } catch (_) {
          return "";
        }
      }

      function validUrl(u) { return /^https?:\/\//i.test(u); }

      function readExtra() {
        var raw = q("extra_buttons");
        if (!raw) return Array.isArray(defaults.extraButtons) ? defaults.extraButtons : [];
        try {
          var parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) {
          return [];
        }
      }

      var title = q("title") || defaults.title;
      var subtitle = q("subtitle") || defaults.subtitle;

      var sLabel = q("secondary_label") || defaults.secondaryLabel;
      var sUrl = q("secondary_url") || defaults.secondaryUrl;

      document.getElementById("title").textContent = title;
      document.getElementById("subtitle").textContent = subtitle;

      var pBtn = document.getElementById("primaryBtn");
      var sBtn = document.getElementById("secondaryBtn");

      sBtn.textContent = sLabel;

        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        extra.appendChild(a);
      });

      if (/YOUR_CHANNEL_ID/i.test(sUrl)) {
        document.getElementById("error").textContent = "Sila update secondaryUrl dalam config.js";
      }
    })();
