<!doctype html>
<html lang="ms">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Reezo Links</title>
  <link rel="stylesheet" href="style.css" />
  <script src="config.js"></script>
</head>
<body>
  <div class="bg-fx"></div>
  <main class="container">
    <header class="hero">
      <div class="logo-wrap">
        <img src="logo.png" alt="Reezo Logo" class="site-logo" />
      </div>
      <h1 id="title">Reezo Official Links</h1>
      <p id="subtitle">Pilih mana-mana link rasmi di bawah.</p>
    </header>

    <section class="card">
      <img src="nextexc.png" alt="NEXT Exclusive" class="promo-image" />
    </section>

    <section class="card">
      <h2 class="section-title">Quick Access</h2>
      <div class="actions">
        <a id="primaryBtn" class="btn btn-primary" href="#" target="_blank" rel="noopener noreferrer">Open Bot</a>
        <a id="secondaryBtn" class="btn btn-secondary" href="#" target="_blank" rel="noopener noreferrer">Open WhatsApp Channel</a>
        <div id="extraBtns" class="actions" style="margin-top:0"></div>
      </div>
      <div id="error" class="error"></div>
    </section>
  </main>

  <script>
    (function () {
      var fallback = {
        title: "Reezo Official Links",
        subtitle: "Pilih mana-mana link rasmi di bawah.",
        primaryLabel: "Open Bot",
        primaryUrl: "https://t.me/MMHREEZO_BOT",
        primaryIcon: "telegram.png",
        secondaryLabel: "Open WhatsApp Channel",
        secondaryUrl: "https://whatsapp.com/channel/YOUR_CHANNEL_ID",
        secondaryIcon: "whatsapp.png",
        extraButtons: []
      };
      var defaults = Object.assign({}, fallback, window.LANDING_DEFAULTS || {});

      function q(name) {
        try {
          return new URLSearchParams(window.location.search).get(name) || "";
        } catch (_) {
          return "";
        }
      }

      function validUrl(u) { return /^https?:\/\//i.test(u); }
      function validIcon(u) {
        if (!u) return true;
        return /^https?:\/\//i.test(u) || /^(?:\.\/|\/)?[A-Za-z0-9_.\-\/]+\.(png|jpg|jpeg|webp|svg)$/i.test(u);
      }

      function setButtonContent(buttonEl, label, iconUrl) {
        buttonEl.textContent = "";
        var wrap = document.createElement("span");
        wrap.className = "btn-content";
        if (iconUrl && validIcon(iconUrl)) {
          var img = document.createElement("img");
          img.className = "btn-icon";
          img.src = iconUrl;
          img.alt = "";
          wrap.appendChild(img);
        }
        var txt = document.createElement("span");
        txt.textContent = label;
        wrap.appendChild(txt);
        buttonEl.appendChild(wrap);
      }

      function readExtra() {
        var raw = q("extra_buttons");
        if (!raw) return Array.isArray(defaults.extraButtons) ? defaults.extraButtons : [];
        try {
          var parsed = JSON.parse(raw);
          return Array.isArray(parsed) ? parsed : [];
        } catch (_) {
          return [];
        }
      }

      var title = q("title") || defaults.title;
      var subtitle = q("subtitle") || defaults.subtitle;
      var pLabel = q("primary_label") || defaults.primaryLabel;
      var pUrl = q("primary_url") || defaults.primaryUrl;
      var pIcon = q("primary_icon") || defaults.primaryIcon || "";
      var sLabel = q("secondary_label") || defaults.secondaryLabel;
      var sUrl = q("secondary_url") || defaults.secondaryUrl;
      var sIcon = q("secondary_icon") || defaults.secondaryIcon || "";

      document.getElementById("title").textContent = title;
      document.getElementById("subtitle").textContent = subtitle;

      var pBtn = document.getElementById("primaryBtn");
      var sBtn = document.getElementById("secondaryBtn");
      setButtonContent(pBtn, pLabel, pIcon);
      pBtn.href = validUrl(pUrl) ? pUrl : "#";
      setButtonContent(sBtn, sLabel, sIcon);
      sBtn.href = validUrl(sUrl) ? sUrl : "#";

      var extra = document.getElementById("extraBtns");
      readExtra().forEach(function (item) {
        var label = String((item && item.label) || "").trim();
        var url = String((item && item.url) || "").trim();
        var icon = String((item && item.icon) || "").trim();
        if (!label || !validUrl(url)) return;
        var a = document.createElement("a");
        a.className = "btn btn-secondary";
        setButtonContent(a, label, icon);
        a.href = url;
        a.target = "_blank";
        a.rel = "noopener noreferrer";
        extra.appendChild(a);
      });

      if (/YOUR_CHANNEL_ID/i.test(sUrl)) {
        document.getElementById("error").textContent = "Sila update secondaryUrl dalam config.js";
      }
    })();
  </script>
</body>
</html>
